[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[build.buildArgs]
SERVICE = "telegram-bot"

[deploy]
startCommand = "node tools/telegram/bot.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[deploy.healthcheck]]
# Telegram bots usan long polling, no HTTP
# Railway verificará que el contenedor esté corriendo
type = "PROCESS"
