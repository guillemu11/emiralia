server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Comprimir assets
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript image/svg+xml application/json;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API requests to dashboard
    location /api/ {
        proxy_pass https://dashboard-production-09fe.up.railway.app/api/;
        proxy_set_header Host dashboard-production-09fe.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
    }

    # SEO: propiedad.html — bots van al endpoint enriquecido del dashboard
    location = /propiedad.html {
        if ($http_user_agent ~* "googlebot|bingbot|slurp|duckduckbot|baiduspider|yandexbot|sogou|exabot|facebot|ia_archiver|linkedinbot|twitterbot|whatsapp|telegrambot|perplexitybot|chatgpt|gptbot|anthropic-ai|claude-web|cohere-ai|meta-externalagent") {
            proxy_pass https://dashboard-production-09fe.up.railway.app/seo/propiedad$is_args$args;
        }
        # Humans: nginx sirve el HTML estático normalmente
    }

    # SEO: sitemap.xml dinámico desde dashboard
    location = /sitemap.xml {
        proxy_pass https://dashboard-production-09fe.up.railway.app/sitemap.xml;
        proxy_set_header Host dashboard-production-09fe.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_cache_valid 200 1h;
    }

    # SPA fallback - todas las rutas van a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
